<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SASSIE QC Checker — Service Integrity</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #334155;
    --border: #475569;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.12);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.12);
    --yellow: #eab308;
    --yellow-bg: rgba(234,179,8,0.12);
    --orange: #f97316;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  .container { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }

  header { text-align: center; margin-bottom: 2rem; }
  header h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.25rem; }
  header p { color: var(--text-muted); font-size: 0.9rem; }

  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    margin-bottom: 1.5rem;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: rgba(59,130,246,0.05);
  }
  .upload-zone svg { margin-bottom: 1rem; }
  .upload-zone h3 { font-size: 1.1rem; margin-bottom: 0.25rem; }
  .upload-zone p { color: var(--text-muted); font-size: 0.85rem; }
  .upload-zone input { display: none; }

  .processing {
    text-align: center;
    padding: 3rem;
    display: none;
  }
  .processing .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--surface2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .results { display: none; }

  .shop-header {
    background: var(--surface);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
    border-left: 4px solid var(--accent);
  }
  .shop-header h2 { font-size: 1.15rem; margin-bottom: 0.5rem; }
  .shop-meta { color: var(--text-muted); font-size: 0.85rem; }
  .shop-meta span { margin-right: 1.5rem; }

  .verdict {
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .verdict.pass { background: var(--green-bg); border: 1px solid var(--green); }
  .verdict.fail { background: var(--red-bg); border: 1px solid var(--red); }
  .verdict.warn { background: var(--yellow-bg); border: 1px solid var(--yellow); }
  .verdict-icon { font-size: 1.8rem; }
  .verdict h3 { font-size: 1.1rem; }
  .verdict p { color: var(--text-muted); font-size: 0.85rem; margin-top: 0.15rem; }

  .section-card {
    background: var(--surface);
    border-radius: 10px;
    margin-bottom: 1rem;
    overflow: hidden;
  }
  .section-header {
    padding: 0.85rem 1.25rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    transition: background 0.15s;
  }
  .section-header:hover { background: var(--surface2); }
  .section-name { font-weight: 600; font-size: 0.95rem; }
  .section-score {
    font-size: 0.85rem;
    padding: 0.2rem 0.65rem;
    border-radius: 20px;
    font-weight: 600;
  }
  .score-good { background: var(--green-bg); color: var(--green); }
  .score-warn { background: var(--yellow-bg); color: var(--yellow); }
  .score-bad { background: var(--red-bg); color: var(--red); }

  .section-body {
    padding: 0 1.25rem 1rem;
    display: none;
  }
  .section-card.open .section-body { display: block; }

  .question-row {
    padding: 0.5rem 0;
    border-bottom: 1px solid rgba(71,85,105,0.3);
    font-size: 0.88rem;
  }
  .question-row:last-child { border-bottom: none; }
  .q-label { color: var(--text-muted); font-size: 0.8rem; }
  .q-answer { margin-top: 0.15rem; }
  .q-answer.yes { color: var(--green); }
  .q-answer.no { color: var(--red); font-weight: 600; }
  .q-comment {
    background: var(--bg);
    padding: 0.6rem 0.85rem;
    border-radius: 6px;
    margin-top: 0.35rem;
    font-size: 0.84rem;
    color: var(--text-muted);
    white-space: pre-wrap;
  }

  .issues-list { margin-bottom: 1.5rem; }
  .issue-card {
    background: var(--surface);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    margin-bottom: 0.75rem;
    border-left: 4px solid var(--red);
  }
  .issue-card.warning { border-left-color: var(--yellow); }
  .issue-card.info { border-left-color: var(--accent); background: rgba(59,130,246,0.08); }
  .issue-card h4 { font-size: 0.95rem; margin-bottom: 0.5rem; }
  .issue-detail { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.25rem; }
  .issue-detail strong { color: var(--text); }


  button.btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 0.6rem 1.5rem;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  button.btn:hover { background: var(--accent-hover); }
  button.btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  button.btn-outline:hover { background: var(--surface2); }

  .reset-bar {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--surface2);
  }


  .stats-bar {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .stat-box {
    background: var(--surface);
    border-radius: 10px;
    padding: 0.85rem 1.1rem;
    flex: 1;
    min-width: 130px;
    text-align: center;
  }
  .stat-value { font-size: 1.5rem; font-weight: 700; }
  .stat-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.15rem; }

  .cleaner-box {
    background: var(--surface);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    margin-top: 1rem;
    border: 1px solid var(--surface2);
  }
  .cleaner-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .cleaner-col h4 { font-size: 0.9rem; margin-bottom: 0.35rem; color: var(--text-muted); }
  .cleaner-text { background: var(--bg); border-radius: 8px; padding: 0.75rem; white-space: pre-wrap; font-size: 0.88rem; }
  .cleaner-actions { margin-top: 0.75rem; display:flex; gap:0.5rem; flex-wrap:wrap; }
  .muted { color: var(--text-muted); font-size: 0.82rem; }

</style>
</head>
<body>
<div class="container">
  <header>
    <h1>SASSIE QC Checker</h1>
    <p>Service Integrity — Upload a shop report PDF for consistency analysis</p>
  </header>

  <div id="uploadZone" class="upload-zone">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="1.5">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
    </svg>
    <h3>Drop SASSIE PDF here or click to upload</h3>
    <p>Print the shop review page to PDF, then upload it here</p>
    <input type="file" id="fileInput" accept=".pdf">
  </div>

  <div id="processing" class="processing">
    <div class="spinner"></div>
    <p>Parsing report and checking consistency...</p>
  </div>

  <div id="results" class="results"></div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const processing = document.getElementById('processing');
const results = document.getElementById('results');
const CLEANER_API = window.CLEANER_API || '/api/clean-comments';

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) processFile(e.target.files[0]); });

async function processFile(file) {
  uploadZone.style.display = 'none';
  processing.style.display = 'block';
  results.style.display = 'none';

  try {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let fullText = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      const strings = content.items.map(item => item.str);
      fullText += strings.join(' ') + '\n';
    }

    const parsed = parseShopReport(fullText);
    const issues = checkConsistency(parsed);
    renderResults(parsed, issues, fullText);
    if (parsed.generalComment && parsed.generalComment.trim().length > 0) {
      autoCleanGeneralComment(parsed.generalComment.trim());
    }
  } catch (err) {
    results.innerHTML = `<div class="verdict fail"><div class="verdict-icon">&#9888;</div><div><h3>Error parsing PDF</h3><p>${err.message}. Make sure this is a SASSIE shop review PDF.</p></div></div>`;
    results.style.display = 'block';
  }
  processing.style.display = 'none';
}

function parseShopReport(text) {
  const report = {
    shopRef: '',
    client: '',
    location: '',
    shopDate: '',
    shopper: '',
    overallScore: 0,
    sections: [],
    questions: [],
    generalComment: '',
    rawText: text
  };

  // Extract shop metadata
  const refMatch = text.match(/Shop Ref#:\s*(\d+)/i);
  if (refMatch) report.shopRef = refMatch[1];

  const dateMatch = text.match(/Shop Date:\s*([\d\/\-]+)/i);
  if (dateMatch) report.shopDate = dateMatch[1];

  const shopperMatch = text.match(/Shopper\s*#\d+:\s*([A-Za-z\s]+?)(?:\s*Shopper Phone|$)/i);
  if (shopperMatch) report.shopper = shopperMatch[1].trim();

  // Try to get client/survey name from the first line or title
  const titleMatch = text.match(/([A-Za-z\s&']+(?:Store|Shop|Visit|Mystery|Audit|Survey|Assessment)[^\n]*\d{4})/i);
  if (titleMatch) report.client = titleMatch[1].trim();

  const locationMatch = text.match(/Location:\s*([^\n(]+)/i);
  if (locationMatch) report.location = locationMatch[1].trim();

  // Extract overall score
  const overallMatch = text.match(/(\d+)%\s*:?\s*Overall\s*Score/i) || text.match(/Overall\s*Score[^0-9]*(\d+)%/i);
  if (overallMatch) report.overallScore = parseInt(overallMatch[1]);

  // Extract section scores from the score summary
  // Handles names like "4 Essentials", "Gallery Entrance", etc.
  const sectionScoreRegex = /(\d+)%\s*:?\s*([\dA-Za-z\s&]+?)\s*\((\d+)\/(\d+)\)/g;
  let match;
  while ((match = sectionScoreRegex.exec(text)) !== null) {
    const name = match[2].trim();
    if (name.toLowerCase() !== 'overall score') {
      report.sections.push({
        name: name,
        percentage: parseInt(match[1]),
        scored: parseInt(match[3]),
        total: parseInt(match[4])
      });
    }
  }

  // Extract questions with Yes/No answers and scores
  // SASSIE PDF format: "1. Question text? 2/2 Yes No" — both Yes and No appear as radio labels
  // We infer the actual answer from the score: full marks = Yes, 0 = No, partial = ambiguous
  // First, split into lines for cleaner parsing
  const lines = text.split(/\n/);
  const fullText = text;

  // Pattern: number. question text?  score/total  Yes No
  // Must start with a digit followed by letter (optional) then period — NOT preceded by % or :
  const qRegex = /(?:^|\s)(\d{1,3}[a-z]?)[\.\)]\s+([A-Z][^?]*\?)\s+(\d+)\/(\d+)\s+Yes\s+No/g;
  while ((match = qRegex.exec(fullText)) !== null) {
    const qNum = match[1];
    const scored = parseInt(match[3]);
    const total = parseInt(match[4]);

    // Skip false positives: question numbers shouldn't be > 100 typically
    if (parseInt(qNum) > 200) continue;

    // Infer answer from score
    let answer;
    if (scored === total) {
      answer = 'Yes';
    } else if (scored === 0) {
      answer = 'No';
    } else {
      answer = 'Partial';
    }

    // Avoid duplicates
    const existing = report.questions.find(q => q.number === qNum);
    if (!existing) {
      report.questions.push({
        number: qNum,
        text: match[2].trim(),
        scored: scored,
        total: total,
        answer: answer,
        comment: ''
      });
    }
  }

  // Also try N/A pattern: "24. Question? 2/2 Yes No N/A"
  const qRegexNA = /(?:^|\s)(\d{1,3}[a-z]?)[\.\)]\s+([A-Z][^?]*\?)\s+(\d+)\/(\d+)\s+Yes\s+No\s+N\/A/g;
  while ((match = qRegexNA.exec(fullText)) !== null) {
    const qNum = match[1];
    const existing = report.questions.find(q => q.number === qNum);
    if (!existing) {
      const scored = parseInt(match[3]);
      const total = parseInt(match[4]);
      report.questions.push({
        number: qNum,
        text: match[2].trim(),
        scored: scored,
        total: total,
        answer: scored === total ? 'Yes' : scored === 0 ? 'No' : 'Partial',
        comment: ''
      });
    }
  }

  // Extract General Summary comment
  // In SASSIE PDFs, the General Summary text always appears right after "UPDATE SURVEY"
  // This is the most reliable anchor across all questionnaire types
  const updateSurveyIdx = text.indexOf('UPDATE SURVEY');
  if (updateSurveyIdx >= 0) {
    let afterUpdate = text.substring(updateSurveyIdx + 'UPDATE SURVEY'.length).trim();

    // The comment text runs until QC Notes markers or end-of-content indicators
    // Common terminators: QC staff initials like "KC 9/3", "MG 9/3", "WB 9/3",
    // or "Spell Check", or "QC Notes", or email-style content
    const terminators = [
      /\b[A-Z]{2,3}\s+\d{1,2}\/\d{1,2}\b/,  // Staff initials + date like "KC 9/3"
      /Spell\s*Check/i,
      /QC\s*Notes/i,
      /Dear\s+[A-Z]/,  // Start of email
      /This email is from/i,
      /Thank you for submitting/i
    ];

    let endIdx = afterUpdate.length;
    for (const term of terminators) {
      const termMatch = afterUpdate.match(term);
      if (termMatch && termMatch.index < endIdx) {
        endIdx = termMatch.index;
      }
    }

    report.generalComment = afterUpdate.substring(0, endIdx).trim();
  }

  // Fallback: find the longest narrative text block (200+ chars of prose)
  if (!report.generalComment || report.generalComment.length < 50) {
    const blocks = text.split(/\n\s*\n/);
    const narrativeBlocks = blocks
      .map(b => b.trim())
      .filter(b => b.length > 200 && /[a-z]{3,}.*\.\s/i.test(b))
      .sort((a, b) => b.length - a.length);

    if (narrativeBlocks.length > 0) {
      report.generalComment = narrativeBlocks[0];
    }
  }

  return report;
}

function checkConsistency(report) {
  const issues = [];
  const gc = (report.generalComment || '').toLowerCase();
  const gcWordCount = gc.split(/\s+/).filter(w => w.length > 0).length;
  const noAnswers = report.questions.filter(q => q.answer === 'No');
  const yesAnswers = report.questions.filter(q => q.answer === 'Yes');

  // ── CHECK 1: CONTRADICTIONS ──
  // If the General Summary CLAIMS something positive that a binary answer contradicts, flag it.
  // This is the real problem — comments saying everything was great when it wasn't.
  const contradictionMap = [
    { keywords: ['badge', 'name badge', 'name tag', 'nametag'], topics: ['badge', 'name badge', 'dressed', 'uniform', 'appearance'] },
    { keywords: ['greeted', 'greeting', 'welcomed', 'acknowledged'], topics: ['greet', 'welcome', 'acknowledg'] },
    { keywords: ['clean', 'tidy', 'presentable', 'well-maintained'], topics: ['clean', 'tidy', 'presentab', 'exterior'] },
    { keywords: ['approached', 'came up to', 'came over'], topics: ['approach', 'came up', 'came over'] },
    { keywords: ['professional', 'dressed well', 'well-dressed', 'uniform'], topics: ['dress', 'professional', 'uniform', 'appearance'] },
    { keywords: ['quote', 'pricing', 'price'], topics: ['quote', 'pricing', 'price'] },
    { keywords: ['farewell', 'goodbye', 'parting'], topics: ['farewell', 'goodbye', 'parting'] },
    { keywords: ['features', 'benefits', 'demonstrated'], topics: ['feature', 'benefit', 'demonstrat'] },
    { keywords: ['additional products', 'add-on', 'addon', 'upsell', 'suggested additional'], topics: ['additional', 'add-on', 'addon', 'upsell', 'enhance the sale'] },
    { keywords: ['objection', 'concern', 'handled'], topics: ['objection', 'concern', 'handled'] },
    { keywords: ['music', 'playing'], topics: ['music'] },
    { keywords: ['promotional', 'banner', 'poster', 'display'], topics: ['promoti', 'banner', 'poster'] },
    { keywords: ['call back', 'follow up', 'callback'], topics: ['call back', 'follow up', 'follow-up'] },
    { keywords: ['online portal', 'convert online'], topics: ['portal', 'online'] },
    { keywords: ['commitment', 'purchase today', 'close', 'closing'], topics: ['commit', 'purchase today', 'closing'] },
  ];

  // Helper: extract a snippet of surrounding text from the General Summary where a keyword was found
  function extractSnippet(text, keyword, contextChars) {
    contextChars = contextChars || 60;
    const idx = text.toLowerCase().indexOf(keyword.toLowerCase());
    if (idx === -1) return null;
    // Find sentence boundaries around the match
    const sentenceStart = Math.max(0, text.lastIndexOf('.', idx) + 1);
    const sentenceEnd = text.indexOf('.', idx + keyword.length);
    const start = sentenceStart > 0 ? sentenceStart : Math.max(0, idx - contextChars);
    const end = sentenceEnd > 0 ? Math.min(text.length, sentenceEnd + 1) : Math.min(text.length, idx + keyword.length + contextChars);
    return text.substring(start, end).trim();
  }

  for (const q of noAnswers) {
    const qTextLower = q.text.toLowerCase();

    for (const mapping of contradictionMap) {
      const questionMatchesTopic = mapping.topics.some(t => qTextLower.includes(t));
      if (!questionMatchesTopic) continue;

      // Check if the General Summary positively claims this thing happened
      const matchedKeyword = mapping.keywords.find(k => gc.includes(k.toLowerCase()));
      if (matchedKeyword) {
        const snippet = extractSnippet(report.generalComment || '', matchedKeyword);
        const quotePart = snippet ? `\n\nThe General Summary says: "${snippet}"` : '';
        issues.push({
          severity: 'error',
          question: `Q${q.number}`,
          questionText: q.text,
          answer: `No — ${q.scored}/${q.total}`,
          problem: `The binary answer is "No" (${q.scored}/${q.total}) but the General Summary claims otherwise.${quotePart}`
        });
      }
    }
  }

  // Also check the reverse: "Yes" answers contradicted by negative comments
  for (const q of yesAnswers) {
    const qTextLower = q.text.toLowerCase();

    for (const mapping of contradictionMap) {
      const questionMatchesTopic = mapping.topics.some(t => qTextLower.includes(t));
      if (!questionMatchesTopic) continue;

      // Check if the General Summary says this DIDN'T happen
      const negativePatterns = mapping.keywords.map(k => `no ${k}|didn't ${k}|did not ${k}|wasn't ${k}|without ${k}|not ${k}|never ${k}|failed to ${k}`);
      const negativeRegex = new RegExp(`(${negativePatterns.join('|')})`, 'i');
      const negMatch = gc.match(negativeRegex);
      if (negMatch) {
        const snippet = extractSnippet(report.generalComment || '', negMatch[0]);
        const quotePart = snippet ? `\n\nThe General Summary says: "${snippet}"` : '';
        issues.push({
          severity: 'error',
          question: `Q${q.number}`,
          questionText: q.text,
          answer: `Yes — ${q.scored}/${q.total}`,
          problem: `The binary answer is "Yes" (full marks) but the General Summary describes a negative experience in this area.${quotePart}`
        });
      }
    }
  }

  // ── CHECK 2: GENERAL SUMMARY TOO SPARSE ──
  // A proper General Summary should be more than a couple of sentences for a 20+ question shop
  if (gcWordCount > 0 && gcWordCount < 30) {
    issues.push({
      severity: 'error',
      question: 'General Summary',
      questionText: 'Summary is too brief',
      answer: `${gcWordCount} words`,
      problem: `The General Summary is only ${gcWordCount} words. For a shop with ${report.questions.length} questions, this needs significantly more detail to give a useful overview of the visit.`
    });
  } else if (gcWordCount >= 30 && gcWordCount < 60) {
    issues.push({
      severity: 'warning',
      question: 'General Summary',
      questionText: 'Summary may be too brief',
      answer: `${gcWordCount} words`,
      problem: `The General Summary is only ${gcWordCount} words. Consider whether this provides enough context for the client to understand the visit.`
    });
  } else if (gcWordCount === 0) {
    issues.push({
      severity: 'error',
      question: 'General Summary',
      questionText: 'No General Summary detected',
      answer: 'Missing',
      problem: `Could not find a General Summary comment. This may be a parsing issue, or the summary is missing from the report.`
    });
  }

  // ── CHECK 3: AI-SOUNDING LANGUAGE ──
  const aiPhrases = [
    'overall experience was very positive',
    'overall experience was positive',
    'pleasant and welcoming atmosphere',
    'communicated clearly throughout',
    'making the shopping experience comfortable',
    'handled this well by explaining',
    'professional manner throughout',
    'my overall experience at',
    'the staff member greeted me promptly',
    'was attentive and communicated',
    'comfortable and enjoyable',
    'comfortable and premium environment',
    'creating a comfortable and premium',
    'felt very pleasant and welcoming',
    'making every effort to ensure',
    'overall, the visit was',
    'the shopping experience was both',
    'a positive and memorable experience',
    'courteous and professional',
    'in a friendly and professional manner',
    'was very helpful and knowledgeable',
    'took the time to explain',
    'went above and beyond',
    'i was thoroughly impressed',
    'the entire experience was seamless',
    'a warm and inviting atmosphere',
    'exceeded my expectations',
    'demonstrated excellent knowledge',
    'provided exceptional service',
    'ensured that i felt valued',
    'i felt valued as a customer',
    'conducted themselves in a professional',
    'maintaining a high standard',
    'enhanced the overall experience'
  ];

  const detectedAI = aiPhrases.filter(phrase => gc.includes(phrase.toLowerCase()));
  if (detectedAI.length >= 3) {
    issues.push({
      severity: 'error',
      question: 'General Summary',
      questionText: 'AI-generated language detected',
      answer: `${detectedAI.length} AI phrases found`,
      problem: `The General Summary contains ${detectedAI.length} phrases commonly produced by ChatGPT/AI tools: "${detectedAI.slice(0, 3).join('", "')}"${detectedAI.length > 3 ? ', and more' : ''}. Comments should sound like they were written by the actual shopper, not polished by AI.`
    });
  } else if (detectedAI.length === 2) {
    issues.push({
      severity: 'warning',
      question: 'General Summary',
      questionText: 'Possible AI-generated language',
      answer: `${detectedAI.length} AI phrases found`,
      problem: `Found phrases commonly produced by AI: "${detectedAI.join('", "')}". This may have been run through ChatGPT. Worth checking.`
    });
  } else if (detectedAI.length === 1) {
    issues.push({
      severity: 'warning',
      question: 'General Summary',
      questionText: 'Possible AI-generated language',
      answer: '1 AI phrase found',
      problem: `Found a phrase commonly produced by AI: "${detectedAI[0]}". Might be fine on its own, but worth a second look.`
    });
  }

  return issues;
}

function extractTopicWords(questionText) {
  const stopWords = new Set(['was','were','the','a','an','did','do','does','all','are','is','you','your','they','their','team','member','members','when','first','have','has','had','been','being','from','this','that','with','for','and','but','not','any','can','could','would','should','into','each','every','how','what','who','where','why','which']);

  return questionText
    .toLowerCase()
    .replace(/[^a-z\s]/g, '')
    .split(/\s+/)
    .filter(w => w.length > 3 && !stopWords.has(w));
}






function detectPaintRecommendationMismatch(report, fullText, issues) {
  try {
    const t = fullText || '';
    const gc = (report && report.generalComment ? report.generalComment : '') || '';
    const isPaint = /paint\s*shop|paint\s*2025|dulux|taubmans|accent|british\s*paints/i.test(t);
    if (!isPaint) return;

    const brandOptions = [
      ['a', 'Accent'],
      ['b', 'British Paints'],
      ['c', 'Dulux'],
      ['d', 'Taubmans Endure'],
      ['e', 'Taubmans Easy Coat'],
      ['f', 'Taubmans Endure/All Weather'],
      ['g', 'Taubmans Sunproof'],
      ['h', 'Wattyl ID'],
      ['i', 'Wattyl Solagard'],
      ['j', 'Other Wattyl Products'],
      ['k', 'Other Taubmans Products'],
      ['l', 'Porters'],
      ['m', 'A brand not listed'],
      ['n', 'No recommendation/multiple brands']
    ];

    const marker = '[✓✔✅☑]';

    function selectedBrand(questionNo, nextNo) {
      const blockRx = new RegExp(`${questionNo}\\.\\s*What brand[\\s\\S]*?${nextNo}\\.`, 'i');
      const m = t.match(blockRx);
      if (!m) return null;
      const block = m[0];
      for (const [code, brand] of brandOptions) {
        const rx = new RegExp(`${code}\\.\\s*[^\\n\\r]*${marker}`, 'i');
        if (rx.test(block)) return brand;
      }
      return null;
    }

        function selectedBrandFallback(questionNo, nextLabel) {
      const m = t.match(new RegExp(`${questionNo}\\.[\\s\\S]*?${nextLabel}`, 'i'));
      if (!m) return null;
      const block=m[0];
      for (const [code, brand] of brandOptions) {
        const rx = new RegExp(`${code}\\.\\s*[^\\n\\r]*${marker}`, 'i');
        if (rx.test(block)) return brand;
      }
      return null;
    }

    const fs = firstSelected || selectedBrandFallback(3,'3a\\.');
    const ss = secondSelected || selectedBrandFallback(6,'6a\\.');

    const mentionRules = [
      ['Dulux', /dulux/i],
      ['Accent', /accent/i],
      ['British Paints', /british\s*paints/i],
      ['Porters', /porters/i],
      ['Taubmans Endure', /taubmans\s*endure/i],
      ['Taubmans Easy Coat', /taubmans\s*easy\s*coat/i],
      ['Taubmans Sunproof', /taubmans\s*sunproof/i],
      ['Wattyl ID', /wattyl\s*id/i],
      ['Wattyl Solagard', /wattyl\s*solagard/i]
    ];

    function mentionedBrand(scopeText, rankWord) {
      if (!scopeText) return null;
      const ranked = new RegExp(`${rankWord}[^\\n\\r\\.]{0,120}`, 'i').test(scopeText);
      if (!ranked) return null;
      for (const [brand, rx] of mentionRules) {
        if (rx.test(scopeText)) return brand;
      }
      return null;
    }

    const firstMention = mentionedBrand(gc, 'first');
    const secondMention = mentionedBrand(gc, 'second|alternative');

    if (fs && firstMention && fs.toLowerCase() !== firstMention.toLowerCase()) {
      issues.push({
        severity: 'error',
        type: 'paint_first_recommendation_mismatch',
        section: 'First Recommendation',
        message: `Paint rule mismatch: Q3 selected "${fs}" but comments indicate first recommendation "${firstMention}".`,
        suggestion: 'Correct either Q3 selection or narrative text before finalising.'
      });
    }

    if (ss && secondMention && ss.toLowerCase() !== secondMention.toLowerCase()) {
      issues.push({
        severity: 'error',
        type: 'paint_second_recommendation_mismatch',
        section: 'Second Recommendation',
        message: `Paint rule mismatch: Q6 selected "${ss}" but comments indicate second recommendation "${secondMention}".`,
        suggestion: 'Correct either Q6 selection or narrative text before finalising.'
      });
    }
  } catch (_e) {
    // fail-safe
  }
}


function detectPaintRecommendationMismatchRaw(fullText, issues) {
  try {
    const t = fullText || '';
    if (!/paint\s*shop|paint\s*2025|dulux|taubmans|accent|british\s*paints/i.test(t)) return;

    const brandMap = [
      ['Accent', /\baccent\b/i],
      ['British Paints', /british\s*paints/i],
      ['Dulux', /\bdulux\b/i],
      ['Taubmans Endure', /taubmans\s*endure/i],
      ['Taubmans Easy Coat', /taubmans\s*easy\s*coat/i],
      ['Porters', /\bporters\b/i],
      ['Wattyl ID', /wattyl\s*id/i],
      ['Wattyl Solagard', /wattyl\s*solagard/i]
    ];

    const marker='[✓✔✅☑]';

    function selectedBySection(sectionLabel, stopLabel){
      const rx = new RegExp(`${sectionLabel}[\\s\\S]*?${stopLabel}`, 'i');
      const m=t.match(rx); if(!m) return null;
      const block=m[0];
      const opts=[
        ['Accent','a'],['British Paints','b'],['Dulux','c'],['Taubmans Endure','d'],['Taubmans Easy Coat','e'],['Porters','l']
      ];
      for (const [name,code] of opts){
        const r=new RegExp(`${code}\\.\\s*[^\\n\\r]*${marker}`,'i');
        if(r.test(block)) return name;
      }
      return null;
    }

    function extractExplain(label, stopLabel){
      const rx=new RegExp(`${label}\\s*Please\\s*explain:\\s*([\\s\\S]*?)${stopLabel}`,'i');
      const m=t.match(rx);
      return m ? m[1].trim() : '';
    }

    const firstSelected = selectedBySection('First\\s+Recommendation','Second\\s+Recommendation|Sentiments|Question\\s*List');
    const secondSelected = selectedBySection('Second\\s+Recommendation','Sentiments|Question\\s*List|Spot\\s+Questions');

    const firstExplain = extractExplain('3a\\.', '4\\.|Second\\s+Recommendation|Sentiments');
    const secondExplain = extractExplain('6a\\.', '7\\.|Sentiments|Spot\\s+Questions');

    function mentionBrand(txt){
      if(!txt) return null;
      for (const [name,rx] of brandMap){ if(rx.test(txt)) return name; }
      return null;
    }

    const firstMention = mentionBrand(firstExplain) || mentionBrand((t.match(/first\s+recommend(?:ed|ation)[^\.\n]{0,180}/i)||[''])[0]);
    const secondMention = mentionBrand(secondExplain) || mentionBrand((t.match(/second\s+recommend(?:ed|ation|alternative)[^\.\n]{0,180}/i)||[''])[0]);

    if (firstSelected && firstMention && firstSelected.toLowerCase() !== firstMention.toLowerCase()) {
      issues.push({
        severity: 'error',
        type: 'paint_first_recommendation_mismatch_raw',
        section: 'First Recommendation',
        message: `Paint mismatch (raw): selected first recommendation is "${firstSelected}" but text references "${firstMention}".`,
        suggestion: 'Check Q3 selection and 3a/comment text for consistency.'
      });
    }

    if (secondSelected && secondMention && secondSelected.toLowerCase() !== secondMention.toLowerCase()) {
      issues.push({
        severity: 'error',
        type: 'paint_second_recommendation_mismatch_raw',
        section: 'Second Recommendation',
        message: `Paint mismatch (raw): selected second recommendation is "${secondSelected}" but text references "${secondMention}".`,
        suggestion: 'Check Q6 selection and 6a/comment text for consistency.'
      });
    }

    if (/First\s+Recommendation/i.test(t) && /Second\s+Recommendation/i.test(t) && /Question\s*Parsed\s*0|Questions\s*Parsed\s*0/i.test('')) {
      // no-op placeholder
    }
  } catch (_e) {}
}


function detectPaintTemplateParserEnforced(fullText, issues) {

      ['j','Other Wattyl Products'],
      ['k','Other Taubmans Products'],

    ];

    function sectionBlock(label, stopRegex){
      const rx = new RegExp(`${label}[\\s\\S]*?${stopRegex}`, 'i');

    const firstSelected = selectedBrand(firstBlock);
    const secondSelected = selectedBrand(secondBlock);

    // Pull narrative snippets likely to contain recommendation wording
    const explain3 = (t.match(/3a\\.\\s*Please\\s*explain:\\s*([\\s\\S]*?)(?:4\\.|Second\\s+Recommendation|Sentiments)/i)||[])[1] || '';
    const explain6 = (t.match(/6a\\.\\s*Please\\s*explain:\\s*([\\s\\S]*?)(?:7\\.|Sentiments|Spot\\s+Questions)/i)||[])[1] || '';

    function firstBrandMention(txt){
      if(!txt) return null;
      for (const [b,rx] of brandMentions){ if(rx.test(txt)) return b; }

    }

    const firstMention = firstBrandMention(explain3) || firstBrandMention((t.match(/first\s+recommend(?:ed|ation)[^\.\n]{0,220}/i)||[])[0] || '');
    const secondMention = firstBrandMention(explain6) || firstBrandMention((t.match(/second\s+recommend(?:ed|ation|alternative)[^\.\n]{0,220}/i)||[])[0] || '');

    if (firstSelected && firstMention && firstSelected.toLowerCase() !== firstMention.toLowerCase()) {
      issues.push({

    if (secondSelected && secondMention && secondSelected.toLowerCase() !== secondMention.toLowerCase()) {

}
function renderResults(report, issues, rawText) {
  const errors = issues.filter(i => i.severity === 'error');
  const warnings = issues.filter(i => i.severity === 'warning');
  const infos = issues.filter(i => i.severity === 'info');

  let verdictClass, verdictIcon, verdictTitle, verdictDesc;
  if (errors.length === 0 && warnings.length <= 1) {
    verdictClass = 'pass';
    verdictIcon = '&#10004;';
    verdictTitle = 'CONSISTENT — Ready for review';
    verdictDesc = 'No major mismatches detected between binary answers and comments.';
  } else if (errors.length === 0) {
    verdictClass = 'warn';
    verdictIcon = '&#9888;';
    verdictTitle = `REVIEW NEEDED — ${warnings.length} items to check`;
    verdictDesc = 'No critical mismatches, but some areas need attention.';
  } else {
    verdictClass = 'fail';
    verdictIcon = '&#10008;';
    verdictTitle = `INCONSISTENT — ${errors.length} mismatch${errors.length > 1 ? 'es' : ''} found`;
    verdictDesc = 'Comments do not match binary answers. Send back to shopper or fix before finalising.';
  }

  let html = '';

  // Shop header
  html += `<div class="shop-header">
    <h2>${report.client || 'Shop Report'}</h2>
    <div class="shop-meta">
      ${report.shopRef ? `<span>Ref# ${report.shopRef}</span>` : ''}
      ${report.shopper ? `<span>Shopper: ${report.shopper}</span>` : ''}
      ${report.shopDate ? `<span>Date: ${report.shopDate}</span>` : ''}
    </div>
  </div>`;

  // Stats bar
  html += `<div class="stats-bar">
    <div class="stat-box">
      <div class="stat-value" style="color:${report.overallScore >= 80 ? 'var(--green)' : report.overallScore >= 60 ? 'var(--yellow)' : 'var(--red)'}">${report.overallScore || '—'}%</div>
      <div class="stat-label">Overall Score</div>
    </div>
    <div class="stat-box">
      <div class="stat-value">${report.sections.length}</div>
      <div class="stat-label">Sections</div>
    </div>
    <div class="stat-box">
      <div class="stat-value">${report.questions.length}</div>
      <div class="stat-label">Questions Parsed</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" style="color:${errors.length > 0 ? 'var(--red)' : 'var(--green)'}">${errors.length}</div>
      <div class="stat-label">Mismatches</div>
    </div>
  </div>`;

  // Verdict
  html += `<div class="verdict ${verdictClass}">
    <div class="verdict-icon">${verdictIcon}</div>
    <div><h3>${verdictTitle}</h3><p>${verdictDesc}</p></div>
  </div>`;

  // Issues list
  if (issues.length > 0) {
    html += `<h3 style="margin-bottom:0.75rem;font-size:1rem;">Issues Found</h3><div class="issues-list">`;
    for (const issue of issues) {
      const cardClass = issue.severity === 'error' ? '' : issue.severity === 'info' ? 'info' : 'warning';
      html += `<div class="issue-card ${cardClass}">
        <h4>${issue.question}: ${issue.questionText}</h4>
        <div class="issue-detail"><strong>Answer/Score:</strong> ${issue.answer}</div>
        <div class="issue-detail"><strong>Problem:</strong> ${issue.problem}</div>
      </div>`;
    }
    html += `</div>`;
  }

  // General comment preview
  if (report.generalComment) {
    const preview = report.generalComment.substring(0, 3000);
    html += `<h3 style="margin:1.5rem 0 0.75rem;font-size:1rem;">General Summary (Original + Cleaned)</h3>
    <div id="cleanerBox" class="cleaner-box">
      <div class="cleaner-grid">
        <div class="cleaner-col">
          <h4>Original</h4>
          <div id="originalComment" class="cleaner-text">${escapeHtml(preview)}${report.generalComment.length > 3000 ? '...' : ''}</div>
          <div class="cleaner-actions"><button class="btn btn-outline" onclick="copyTextById('originalComment')">Copy original</button></div>
        </div>
        <div class="cleaner-col">
          <h4>Cleaned</h4>
          <div id="cleanedComment" class="cleaner-text">Preparing cleaned version…</div>
          <div class="cleaner-actions">
            <button id="copyCleanedBtn" class="btn" onclick="copyTextById('cleanedComment')" disabled>Copy cleaned for SASSIE</button>
          </div>
        </div>
      </div>
      <div id="cleanerStatus" class="muted" style="margin-top:0.6rem;">Waiting…</div>
    </div>`;
  }

  // Reset
  html += `<div class="reset-bar">
    <button class="btn btn-outline" onclick="resetApp()">Check Another Report</button>
  </div>`;

  results.innerHTML = html;
  results.style.display = 'block';
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}


async function autoCleanGeneralComment(originalComment) {
  const box = document.getElementById('cleanerBox');
  if (!box) return;
  const status = document.getElementById('cleanerStatus');
  const cleanedEl = document.getElementById('cleanedComment');
  const copyBtn = document.getElementById('copyCleanedBtn');
  status.textContent = 'Cleaning comment with AI…';
  try {
    const res = await fetch(CLEANER_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ comment: originalComment })
    });
    if (!res.ok) throw new Error(`Cleaner API error (${res.status})`);
    const data = await res.json();
    cleanedEl.textContent = data.cleaned || originalComment;
    status.textContent = 'Cleaned automatically (gpt-4.1-mini). Review then copy into SASSIE.';
    copyBtn.disabled = false;
  } catch (e) {
    cleanedEl.textContent = originalComment;
    status.textContent = 'Cleaner unavailable. Showing original text. Start backend on Mac mini to enable cleaning.';
    copyBtn.disabled = false;
  }
}

function copyTextById(id) {
  const txt = document.getElementById(id)?.textContent || '';
  navigator.clipboard.writeText(txt);
}

function resetApp() {
  uploadZone.style.display = 'block';
  results.style.display = 'none';
  results.innerHTML = '';
  fileInput.value = '';
}
