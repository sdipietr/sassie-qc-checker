<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SASSIE QC Checker — Service Integrity</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #334155;
    --border: #475569;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.12);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.12);
    --yellow: #eab308;
    --yellow-bg: rgba(234,179,8,0.12);
    --orange: #f97316;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  .container { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }

  header { text-align: center; margin-bottom: 2rem; }
  header h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.25rem; }
  header p { color: var(--text-muted); font-size: 0.9rem; }

  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    margin-bottom: 1.5rem;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: rgba(59,130,246,0.05);
  }
  .upload-zone svg { margin-bottom: 1rem; }
  .upload-zone h3 { font-size: 1.1rem; margin-bottom: 0.25rem; }
  .upload-zone p { color: var(--text-muted); font-size: 0.85rem; }
  .upload-zone input { display: none; }

  .processing {
    text-align: center;
    padding: 3rem;
    display: none;
  }
  .processing .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--surface2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .results { display: none; }

  .shop-header {
    background: var(--surface);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
    border-left: 4px solid var(--accent);
  }
  .shop-header h2 { font-size: 1.15rem; margin-bottom: 0.5rem; }
  .shop-meta { color: var(--text-muted); font-size: 0.85rem; }
  .shop-meta span { margin-right: 1.5rem; }

  .verdict {
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .verdict.pass { background: var(--green-bg); border: 1px solid var(--green); }
  .verdict.fail { background: var(--red-bg); border: 1px solid var(--red); }
  .verdict.warn { background: var(--yellow-bg); border: 1px solid var(--yellow); }
  .verdict-icon { font-size: 1.8rem; }
  .verdict h3 { font-size: 1.1rem; }
  .verdict p { color: var(--text-muted); font-size: 0.85rem; margin-top: 0.15rem; }

  .section-card {
    background: var(--surface);
    border-radius: 10px;
    margin-bottom: 1rem;
    overflow: hidden;
  }
  .section-header {
    padding: 0.85rem 1.25rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    transition: background 0.15s;
  }
  .section-header:hover { background: var(--surface2); }
  .section-name { font-weight: 600; font-size: 0.95rem; }
  .section-score {
    font-size: 0.85rem;
    padding: 0.2rem 0.65rem;
    border-radius: 20px;
    font-weight: 600;
  }
  .score-good { background: var(--green-bg); color: var(--green); }
  .score-warn { background: var(--yellow-bg); color: var(--yellow); }
  .score-bad { background: var(--red-bg); color: var(--red); }

  .section-body {
    padding: 0 1.25rem 1rem;
    display: none;
  }
  .section-card.open .section-body { display: block; }

  .answer-row {
    padding: 0.5rem 0;
    border-bottom: 1px solid rgba(71,85,105,0.3);
    font-size: 0.88rem;
    display: flex;
    gap: 1rem;
    align-items: baseline;
  }
  .answer-row:last-child { border-bottom: none; }
  .answer-label { color: var(--text-muted); font-size: 0.8rem; min-width: 80px; }
  .answer-value { color: var(--text); }
  .answer-value.yes { color: var(--green); font-weight: 600; }
  .answer-value.no { color: var(--red); font-weight: 600; }

  .issues-list { margin-bottom: 1.5rem; }
  .issue-card {
    background: var(--surface);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    margin-bottom: 0.75rem;
    border-left: 4px solid var(--red);
  }
  .issue-card.warning { border-left-color: var(--yellow); }
  .issue-card.info { border-left-color: var(--accent); background: rgba(59,130,246,0.08); }
  .issue-card h4 { font-size: 0.95rem; margin-bottom: 0.5rem; }
  .issue-detail { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.25rem; }
  .issue-detail strong { color: var(--text); }

  button.btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 0.6rem 1.5rem;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  button.btn:hover { background: var(--accent-hover); }
  button.btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  button.btn-outline:hover { background: var(--surface2); }

  .reset-bar {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--surface2);
  }

  .stats-bar {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .stat-box {
    background: var(--surface);
    border-radius: 10px;
    padding: 0.85rem 1.1rem;
    flex: 1;
    min-width: 130px;
    text-align: center;
  }
  .stat-value { font-size: 1.5rem; font-weight: 700; }
  .stat-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.15rem; }

  .q-comment {
    background: var(--bg);
    padding: 0.6rem 0.85rem;
    border-radius: 6px;
    margin-top: 0.35rem;
    font-size: 0.84rem;
    color: var(--text-muted);
    white-space: pre-wrap;
  }

  .format-warning {
    background: rgba(234,179,8,0.1);
    border: 1px solid var(--yellow);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
    font-size: 0.88rem;
    color: var(--yellow);
  }
  .format-warning strong { display: block; margin-bottom: 0.25rem; font-size: 0.95rem; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>SASSIE QC Checker</h1>
    <p>Service Integrity — Upload the shopper DSV PDF for consistency analysis</p>
  </header>

  <div id="uploadZone" class="upload-zone">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="1.5">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
    </svg>
    <h3>Drop SASSIE DSV PDF here or click to upload</h3>
    <p>Use the shopper report PDF (filename starts with "dsv_"), not the admin review PDF</p>
    <input type="file" id="fileInput" accept=".pdf">
  </div>

  <div id="processing" class="processing">
    <div class="spinner"></div>
    <p>Parsing report and checking consistency...</p>
  </div>

  <div id="results" class="results"></div>
</div>

<script>
// The character SASSIE uses to mark selected checkboxes/radio buttons
const CHECKED = '\ue61d';

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const uploadZone = document.getElementById('uploadZone');
const fileInput  = document.getElementById('fileInput');
const processing = document.getElementById('processing');
const results    = document.getElementById('results');

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) processFile(e.target.files[0]); });

async function processFile(file) {
  uploadZone.style.display = 'none';
  processing.style.display = 'block';
  results.style.display = 'none';

  try {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

    let pages = [];
    let fullText = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page    = await pdf.getPage(i);
      const content = await page.getTextContent();
      const pageText = content.items.map(item => item.str).join(' ');
      pages.push(pageText);
      fullText += pageText + '\n';
    }

    const parsed = parseShopReport(fullText, pages);
    const issues = checkConsistency(parsed);
    renderResults(parsed, issues, fullText);
  } catch (err) {
    results.innerHTML = `<div class="verdict fail">
      <div class="verdict-icon">&#9888;</div>
      <div><h3>Error parsing PDF</h3><p>${escapeHtml(err.message)}</p></div>
    </div>`;
    results.style.display = 'block';
  }
  processing.style.display = 'none';
}

// ── BRAND LIST ──────────────────────────────────────────────────────────────
const BRANDS = [
  'Dulux', 'Accent', 'British Paints', 'Taubmans Endure', 'Taubmans Easy Coat',
  'Taubmans Endure/All Weather', 'Taubmans Sunproof', 'Wattyl ID', 'Wattyl Solagard',
  'Other Wattyl Products', 'Other Taubmans Products', 'Porters'
];

// ── PARSER ──────────────────────────────────────────────────────────────────
function parseShopReport(text, pages) {
  const report = {
    shopRef:        '',
    client:         '',
    location:       '',
    shopDate:       '',
    isDSV:          false,
    overallScore:   null,
    sections:       [],
    firstBrand:     '',
    secondBrand:    '',
    q2:             null,   // Did staff ask questions?
    q11:            null,   // Pre-tinned mentioned?
    q11a:           null,   // Alternative colour suggested?
    firstReasons:   [],
    secondReasons:  [],
    generalComment: '',
    rawText:        text
  };

  // Detect DSV format
  report.isDSV = text.includes('YOUR SCORE INFORMATION') || text.includes(CHECKED);

  // ── Metadata ──
  const refMatch = text.match(/Shop Ref#:\s*(\d+)/i);
  if (refMatch) report.shopRef = refMatch[1];

  const dateMatch = text.match(/Shop Date:\s*([\d\/]+)/i) ||
                    text.match(/Report Date\s+([\d\/]+)/i);
  if (dateMatch) report.shopDate = dateMatch[1];

  // Client: "246556 Paint Shop: Paint 2025/2026"
  const clientMatch = text.match(/\d{5,6}\s+([\w][\w\s:\/&\-]+?)(?=\s{2,}|\n|Location)/);
  if (clientMatch) report.client = clientMatch[1].trim();

  // Location: first "BMS ..." or similar store name line
  const locMatch = text.match(/Location\s*\n([^\n]+)/i) ||
                   text.match(/(BMS\s+[\w\s]+(?:\d{6})?)/);
  if (locMatch) report.location = (locMatch[1] || locMatch[0]).trim().replace(/\s+/g, ' ');

  // Overall score
  const scoreMatch = text.match(/(\d+)%\s*:?\s*Overall\s*Score/i);
  if (scoreMatch) report.overallScore = parseInt(scoreMatch[1]);

  // ── Section scores ──
  // Patterns like: "First Recommendation 41% (28/68)"
  const sectionRegex = /(First Recommendation|Second Recommendation|Sentiments|Assistance|Spot Questions)\s+(\d+)%\s*\((\d+)\/(\d+)\)/gi;
  let m;
  while ((m = sectionRegex.exec(text)) !== null) {
    report.sections.push({
      name:       m[1].trim(),
      percentage: parseInt(m[2]),
      scored:     parseInt(m[3]),
      total:      parseInt(m[4])
    });
  }
  // Also catch "41% (28/68)" style from header
  const altSectionRegex = /(\d+)%\s*\((\d+)\/(\d+)\)\s*(?::?\s*)?(First Recommendation|Second Recommendation|Sentiments)/gi;
  while ((m = altSectionRegex.exec(text)) !== null) {
    if (!report.sections.find(s => s.name.toLowerCase() === m[4].toLowerCase())) {
      report.sections.push({
        name:       m[4].trim(),
        percentage: parseInt(m[1]),
        scored:     parseInt(m[2]),
        total:      parseInt(m[3])
      });
    }
  }

  // ── Detect selected answers (lines containing CHECKED) ──
  const lines = text.split('\n');

  // Q2: Did staff ask questions?
  for (let i = 0; i < lines.length; i++) {
    if (/staff member ask questions/i.test(lines[i])) {
      const context = lines.slice(i, i + 4).join(' ');
      if (/Yes\s*\ue61d/.test(context)) report.q2 = 'Yes';
      else if (/No\s*\ue61d/.test(context)) report.q2 = 'No';
      break;
    }
  }

  // Q11: Pre-tinned mentioned?
  for (let i = 0; i < lines.length; i++) {
    if (/pre-tinned/i.test(lines[i])) {
      const context = lines.slice(i, i + 3).join(' ');
      if (/Yes\s*\ue61d/.test(context)) report.q11 = 'Yes';
      else if (/No\s*\ue61d/.test(context)) report.q11 = 'No';
      // Q11a is the next Yes/No block
      const context11a = lines.slice(i + 1, i + 6).join(' ');
      const afterYes = context11a.replace(/Yes\s*\ue61d/, ''); // remove Q11 yes if present
      if (/No\s*\ue61d/.test(afterYes)) report.q11a = 'No';
      else if (/Yes\s*\ue61d/.test(afterYes)) report.q11a = 'Yes';
      break;
    }
  }

  // ── Brand detection ──
  // Section names appear twice: once in the score header (no score attached)
  // and once as body section headers ("First Recommendation 41% (28/68)").
  // We must find the BODY versions only, so we match "Name XX% (YY/ZZ)" format.
  function findBodySection(haystack, sectionName) {
    const escaped = sectionName.replace(/[()\/]/g, c => '\\' + c);
    const m = new RegExp(escaped + '\\s+\\d+%\\s*\\(\\d+\\/\\d+\\)').exec(haystack);
    return m ? m.index : -1;
  }

  function indexAfter(haystack, needle, from) {
    const idx = haystack.indexOf(needle, from);
    return idx !== -1 ? idx : haystack.length;
  }

  const firstRecStart  = findBodySection(text, 'First Recommendation');
  const secondRecStart = findBodySection(text, 'Second Recommendation');
  const sentStart      = secondRecStart !== -1
    ? indexAfter(text, 'Sentiments', secondRecStart + 1)
    : indexAfter(text, 'Sentiments', 0);
  const gcStart        = text.indexOf('General Comments');

  function findCheckedBrand(sectionText) {
    const candidates = [];
    for (const brand of BRANDS) {
      const escaped = brand.replace(/[()\/]/g, c => '\\' + c);
      // Non-greedy: find the CLOSEST checkmark after the brand name (max 80 chars)
      // This prevents a brand earlier in the list from stealing a checkmark that
      // belongs to a later option whose parenthetical text is shorter.
      const m = new RegExp(escaped + '(.{0,80}?)\ue61d', 's').exec(sectionText);
      if (m) candidates.push({ brand, distance: m[1].length });
    }
    if (candidates.length === 0) return '';
    // Return the brand whose checkmark is closest (least intervening text)
    candidates.sort((a, b) => a.distance - b.distance);
    return candidates[0].brand;
  }

  if (firstRecStart !== -1) {
    const end = secondRecStart < text.length ? secondRecStart : text.length;
    report.firstBrand = findCheckedBrand(text.substring(firstRecStart, end));
  }

  if (secondRecStart !== -1 && secondRecStart < text.length) {
    report.secondBrand = findCheckedBrand(text.substring(secondRecStart, sentStart));
  }

  // ── General Comment ──
  if (gcStart !== -1) {
    const qcIdx = text.indexOf('QC Notes', gcStart);
    let gc = text.substring(gcStart + 'General Comments'.length,
                            qcIdx !== -1 ? qcIdx : text.length);
    // Strip instruction text
    gc = gc.replace(/You MUST answer[\s\S]*?brand recommendations\./i, '').trim();
    gc = gc.replace(/Spell Check/gi, '').trim();
    report.generalComment = gc;
  }

  return report;
}

// ── CONSISTENCY CHECKS ──────────────────────────────────────────────────────
function checkConsistency(report) {
  const issues = [];
  const gc = (report.generalComment || '').toLowerCase();
  const gcWords = gc.split(/\s+/).filter(w => w.length > 0).length;

  // ── CHECK 1: First brand vs General Comment ──
  // If a brand was selected in Q3, the comment should mention it
  if (report.firstBrand) {
    const brandKey = report.firstBrand.split(' ')[0].toLowerCase(); // e.g. "dulux", "accent"
    if (!gc.includes(brandKey)) {
      issues.push({
        severity: 'error',
        title: 'First brand not mentioned in comment',
        detail: `Q3 has <strong>${report.firstBrand}</strong> selected as the first recommendation, but the General Comment does not mention this brand. Check that the correct brand was ticked.`
      });
    }
  }

  // ── CHECK 2: Comment mentions a brand as first rec that doesn't match Q3 ──
  if (report.firstBrand) {
    const brandKey = report.firstBrand.split(' ')[0].toLowerCase();
    // Look for other brands mentioned as "first" or "best" in comment
    for (const brand of BRANDS) {
      const key = brand.split(' ')[0].toLowerCase();
      if (key === brandKey) continue;
      // If another brand is described as first/best/recommended in comment
      if (gc.includes(key) && /first|best|recommend/i.test(gc)) {
        const idx = gc.indexOf(key);
        const snippet = gc.substring(Math.max(0, idx - 40), idx + 60);
        if (/best|first|recommend/i.test(snippet)) {
          issues.push({
            severity: 'warning',
            title: 'Comment references different brand as primary',
            detail: `Q3 shows <strong>${report.firstBrand}</strong> selected, but the General Comment appears to describe <strong>${brand}</strong> as the best/first recommendation. Verify the brand selection is correct.`
          });
          break;
        }
      }
    }
  }

  // ── CHECK 3: Second recommendation — brand selection vs comment ──
  // Find what brand the comment describes as the second recommendation
  const secondBrandInComment = (() => {
    const secondIdx = gc.search(/second|also recommend|alternative|as well/);
    if (secondIdx === -1) return null;
    const afterSecond = gc.substring(secondIdx);
    // Find the brand that appears EARLIEST after the "second" keyword
    // (not just first in the BRANDS array) to avoid picking up brands
    // mentioned later in a different context
    let earliest = null;
    let earliestIdx = Infinity;
    for (const b of BRANDS) {
      const key = b.split(' ')[0].toLowerCase();
      const idx = afterSecond.indexOf(key);
      if (idx !== -1 && idx < earliestIdx) {
        earliestIdx = idx;
        earliest = b;
      }
    }
    return earliest;
  })();

  if (report.secondBrand && secondBrandInComment) {
    const selectedKey = report.secondBrand.split(' ')[0].toLowerCase();
    const commentKey  = secondBrandInComment.split(' ')[0].toLowerCase();
    if (selectedKey !== commentKey) {
      issues.push({
        severity: 'error',
        title: 'Second brand selection contradicts comment',
        detail: `Q6 has <strong>${report.secondBrand}</strong> selected but the General Comment describes <strong>${secondBrandInComment}</strong> as the second recommendation. One of these needs correcting.`
      });
    }
  } else if (!report.secondBrand && secondBrandInComment) {
    issues.push({
      severity: 'error',
      title: 'No second brand selected but comment implies one',
      detail: `No brand is selected in Q6, but the General Comment describes <strong>${secondBrandInComment}</strong> as a second recommendation.`
    });
  } else if (report.secondBrand && !secondBrandInComment) {
    const secondSection = report.sections.find(s => /second/i.test(s.name));
    if (secondSection && secondSection.scored === 0) {
      issues.push({
        severity: 'warning',
        title: 'Second brand selected but not mentioned in comment',
        detail: `Q6 has <strong>${report.secondBrand}</strong> selected (scoring 0/${secondSection.total}) but the General Comment does not appear to reference a second recommendation. Verify whether a second rec actually occurred.`
      });
    }
  }

  // ── CHECK 4: Q2 — Staff asked questions ──
  if (report.q2 === 'No') {
    const positiveSignals = ['asked', 'question', 'listened', 'understand', 'enquir', 'needs'];
    if (positiveSignals.some(p => gc.includes(p))) {
      issues.push({
        severity: 'error',
        title: 'Q2 answered No but comment suggests otherwise',
        detail: `Q2 (Did the staff member ask questions?) is marked <strong>No</strong>, but the General Comment describes the staff member asking questions and/or listening to the shopper. One of these needs correcting.`
      });
    }
  } else if (report.q2 === 'Yes') {
    const negativeSignals = ["didn't ask", "did not ask", "no questions", "without asking", "never asked"];
    if (negativeSignals.some(p => gc.includes(p))) {
      issues.push({
        severity: 'error',
        title: 'Q2 answered Yes but comment suggests otherwise',
        detail: `Q2 is marked <strong>Yes</strong> but the General Comment suggests the staff member did not ask questions.`
      });
    }
  }

  // ── CHECK 5: General Comment length ──
  if (gcWords === 0) {
    issues.push({
      severity: 'error',
      title: 'No General Comment detected',
      detail: 'Could not find a General Comment. It may be missing or the wrong PDF was uploaded.'
    });
  } else if (gcWords < 30) {
    issues.push({
      severity: 'error',
      title: 'General Comment too brief',
      detail: `Only <strong>${gcWords} words</strong>. The comment needs significantly more detail about what occurred during the visit.`
    });
  } else if (gcWords < 60) {
    issues.push({
      severity: 'warning',
      title: 'General Comment may be too brief',
      detail: `Only <strong>${gcWords} words</strong>. Consider whether this gives the client enough context about the visit.`
    });
  }

  // ── CHECK 6: AI-generated language ──
  const aiPhrases = [
    'overall experience was very positive', 'overall experience was positive',
    'pleasant and welcoming atmosphere', 'communicated clearly throughout',
    'professional manner throughout', 'comfortable and enjoyable',
    'comfortable and premium environment', 'felt very pleasant and welcoming',
    'overall, the visit was', 'a positive and memorable experience',
    'courteous and professional', 'in a friendly and professional manner',
    'was very helpful and knowledgeable', 'went above and beyond',
    'i was thoroughly impressed', 'the entire experience was seamless',
    'a warm and inviting atmosphere', 'exceeded my expectations',
    'demonstrated excellent knowledge', 'provided exceptional service',
    'ensured that i felt valued', 'i felt valued as a customer',
    'conducted themselves in a professional', 'maintaining a high standard',
    'enhanced the overall experience', 'making the shopping experience',
    'making every effort to ensure'
  ];
  const detectedAI = aiPhrases.filter(p => gc.includes(p));
  if (detectedAI.length >= 3) {
    issues.push({
      severity: 'error',
      title: `AI-generated language detected (${detectedAI.length} phrases)`,
      detail: `Phrases commonly produced by ChatGPT/AI: <em>"${detectedAI.slice(0, 3).join('", "')}"</em>${detectedAI.length > 3 ? `, and ${detectedAI.length - 3} more` : ''}. Comments must be written by the shopper, not polished by AI.`
    });
  } else if (detectedAI.length > 0) {
    issues.push({
      severity: 'warning',
      title: 'Possible AI-generated language',
      detail: `Found ${detectedAI.length} AI-typical phrase(s): <em>"${detectedAI.join('", "')}"</em>. Worth checking.`
    });
  }

  return issues;
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderResults(report, issues, rawText) {
  const errors   = issues.filter(i => i.severity === 'error');
  const warnings = issues.filter(i => i.severity === 'warning');

  let verdictClass, verdictIcon, verdictTitle, verdictDesc;
  if (errors.length === 0 && warnings.length <= 1) {
    verdictClass = 'pass';
    verdictIcon  = '&#10004;';
    verdictTitle = 'CONSISTENT — Ready for review';
    verdictDesc  = 'No major mismatches detected between answers and comments.';
  } else if (errors.length === 0) {
    verdictClass = 'warn';
    verdictIcon  = '&#9888;';
    verdictTitle = `REVIEW NEEDED — ${warnings.length} items to check`;
    verdictDesc  = 'No critical mismatches, but some areas need attention.';
  } else {
    verdictClass = 'fail';
    verdictIcon  = '&#10008;';
    verdictTitle = `INCONSISTENT — ${errors.length} mismatch${errors.length > 1 ? 'es' : ''} found`;
    verdictDesc  = 'Comments do not match answers. Send back to shopper or fix before finalising.';
  }

  let html = '';

  // Format warning if not DSV
  if (!report.isDSV) {
    html += `<div class="format-warning">
      <strong>Wrong PDF format?</strong>
      This doesn't appear to be a DSV shopper report. Upload the PDF with a filename starting with "dsv_" for accurate checkbox detection. Results below may be incomplete.
    </div>`;
  }

  // Shop header
  html += `<div class="shop-header">
    <h2>${escapeHtml(report.client || 'Shop Report')}</h2>
    <div class="shop-meta">
      ${report.shopRef   ? `<span>Ref# ${escapeHtml(report.shopRef)}</span>`   : ''}
      ${report.shopDate  ? `<span>Date: ${escapeHtml(report.shopDate)}</span>` : ''}
      ${report.location  ? `<span>${escapeHtml(report.location)}</span>`       : ''}
    </div>
  </div>`;

  // Stats bar
  const firstSec  = report.sections.find(s => /first/i.test(s.name));
  const secondSec = report.sections.find(s => /second/i.test(s.name));
  const sentSec   = report.sections.find(s => /sentiments/i.test(s.name));

  html += `<div class="stats-bar">
    <div class="stat-box">
      <div class="stat-value" style="color:${report.overallScore >= 80 ? 'var(--green)' : report.overallScore >= 60 ? 'var(--yellow)' : 'var(--red)'}">
        ${report.overallScore !== null ? report.overallScore + '%' : '—'}
      </div>
      <div class="stat-label">Overall Score</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" style="color:${firstSec && firstSec.percentage >= 60 ? 'var(--green)' : 'var(--red)'}">
        ${firstSec ? firstSec.percentage + '%' : '—'}
      </div>
      <div class="stat-label">First Rec</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" style="color:${secondSec && secondSec.percentage >= 60 ? 'var(--green)' : 'var(--red)'}">
        ${secondSec ? secondSec.percentage + '%' : '—'}
      </div>
      <div class="stat-label">Second Rec</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" style="color:${errors.length > 0 ? 'var(--red)' : 'var(--green)'}">
        ${errors.length}
      </div>
      <div class="stat-label">Mismatches</div>
    </div>
  </div>`;

  // Verdict
  html += `<div class="verdict ${verdictClass}">
    <div class="verdict-icon">${verdictIcon}</div>
    <div><h3>${verdictTitle}</h3><p>${verdictDesc}</p></div>
  </div>`;

  // Issues
  if (issues.length > 0) {
    html += `<h3 style="margin-bottom:0.75rem;font-size:1rem;">Issues Found</h3><div class="issues-list">`;
    for (const issue of issues) {
      const cls = issue.severity === 'error' ? '' : 'warning';
      html += `<div class="issue-card ${cls}">
        <h4>${escapeHtml(issue.title)}</h4>
        <div class="issue-detail">${issue.detail}</div>
      </div>`;
    }
    html += `</div>`;
  }

  // Parsed answers panel
  html += `<h3 style="margin:1.5rem 0 0.75rem;font-size:1rem;">Parsed Answers</h3>
  <div class="section-card open">
    <div class="section-body" style="display:block;">`;

  function answerRow(label, value) {
    if (!value) return '';
    const cls = value === 'Yes' ? 'yes' : value === 'No' ? 'no' : '';
    return `<div class="answer-row">
      <span class="answer-label">${label}</span>
      <span class="answer-value ${cls}">${escapeHtml(value)}</span>
    </div>`;
  }

  html += answerRow('First Brand', report.firstBrand || 'Not detected');
  html += answerRow('Second Brand', report.secondBrand || 'None');
  html += answerRow('Q2 — Staff asked questions?', report.q2 || 'Not detected');
  html += answerRow('Q11 — Pre-tinned mentioned?', report.q11 || 'Not detected');
  html += answerRow('Q11a — Alternative colour?', report.q11a || 'Not detected');

  if (report.sections.length > 0) {
    for (const s of report.sections) {
      html += answerRow(s.name, `${s.percentage}% (${s.scored}/${s.total})`);
    }
  }

  html += `</div></div>`;

  // General Comment
  if (report.generalComment) {
    html += `<h3 style="margin:1.5rem 0 0.75rem;font-size:1rem;">General Comment (extracted)</h3>
    <div class="section-card open">
      <div class="section-body" style="display:block;">
        <div class="q-comment">${escapeHtml(report.generalComment.substring(0, 2000))}${report.generalComment.length > 2000 ? '...' : ''}</div>
      </div>
    </div>`;
  }

  // Debug panel
  const CHECKED = '\ue61d';
  function findBodySection(haystack, name) {
    const escaped = name.replace(/[()\/]/g, c => '\\' + c);
    const m = new RegExp(escaped + '\\s+\\d+%\\s*\\(\\d+\\/\\d+\\)').exec(haystack);
    return m ? m.index : -1;
  }
  const dbgFirst  = findBodySection(rawText, 'First Recommendation');
  const dbgSecond = findBodySection(rawText, 'Second Recommendation');
  const dbgSent   = rawText.indexOf('Sentiments', dbgSecond + 1);
  const dbgSection = dbgSecond !== -1 ? rawText.substring(dbgSecond, dbgSent !== -1 ? dbgSent : dbgSecond + 500) : 'NOT FOUND';
  const checkedLines = rawText.split('\n').filter(l => l.includes(CHECKED)).map(l => escapeHtml(l)).join('<br>');

  html += `<h3 style="margin:1.5rem 0 0.75rem;font-size:1rem;color:var(--yellow)">Debug</h3>
  <div class="section-card open"><div class="section-body" style="display:block;font-size:0.78rem;font-family:monospace;">
    <div><strong>firstRecStart:</strong> ${dbgFirst}</div>
    <div><strong>secondRecStart:</strong> ${dbgSecond}</div>
    <div><strong>sentStart:</strong> ${dbgSent}</div>
    <div style="margin-top:0.5rem"><strong>Second rec section (first 300 chars):</strong><br><pre style="white-space:pre-wrap;color:var(--text-muted)">${escapeHtml(dbgSection.substring(0, 300))}</pre></div>
    <div style="margin-top:0.5rem"><strong>All \\ue61d lines:</strong><br>${checkedLines}</div>
  </div></div>`;

  // Reset
  html += `<div class="reset-bar">
    <button class="btn btn-outline" onclick="resetApp()">Check Another Report</button>
  </div>`;

  results.innerHTML = html;
  results.style.display = 'block';
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = String(text);
  return div.innerHTML;
}

function resetApp() {
  uploadZone.style.display = 'block';
  results.style.display    = 'none';
  results.innerHTML        = '';
  fileInput.value          = '';
}
</script>
</body>
</html>
